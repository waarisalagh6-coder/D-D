<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚔️ DungeonNet — Multiplayer D&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== LOBBY SCREEN ===================== -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-bg"></div>
    <div class="lobby-content">
      <div class="logo-wrap">
        <div class="logo-rune">⚔</div>
        <h1 class="logo-title">DungeonNet</h1>
        <p class="logo-sub">A Real-Time Multiplayer Adventure</p>
      </div>

      <div class="lobby-card">
        <!-- Name + Avatar -->
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name..." maxlength="20" />
        </div>

        <div class="form-group">
          <label>Choose Your Avatar</label>
          <div class="avatar-row" id="avatar-row">
            <!-- Avatars rendered by JS -->
          </div>
        </div>

        <div class="lobby-divider"><span>— Choose Your Path —</span></div>

        <!-- Create or Join -->
        <div class="lobby-actions">
          <div class="action-panel">
            <h3>⚡ Create Room</h3>
            <p class="action-desc">Become the Dungeon Master. Set the stage.</p>
            <button class="btn btn-gold" id="btn-create">Create Room</button>
          </div>
          <div class="action-divider">OR</div>
          <div class="action-panel">
            <h3>🗺 Join Room</h3>
            <p class="action-desc">Enter a code and join the adventure.</p>
            <input type="text" id="room-code-input" placeholder="ROOM CODE" maxlength="6" />
            <button class="btn btn-silver" id="btn-join">Join Room</button>
          </div>
        </div>

        <div id="lobby-error" class="lobby-error hidden"></div>
      </div>
    </div>
  </div>

  <!-- ===================== GAME SCREEN ===================== -->
  <div id="game-screen" class="screen hidden">

    <!-- TOP BAR -->
    <div id="top-bar">
      <div id="room-info">
        <span class="room-label">ROOM</span>
        <span id="room-code-display" class="room-code">------</span>
        <button class="btn-copy" id="btn-copy-code" title="Copy code">📋</button>
      </div>
      <div id="player-list-bar">
        <!-- Player badges injected here -->
      </div>
      <div id="my-role-badge"></div>
    </div>

    <!-- MAIN LAYOUT -->
    <div id="game-layout">

      <!-- LEFT: CANVAS -->
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>

        <!-- Floating dice result overlay -->
        <div id="dice-overlay" class="hidden">
          <div id="dice-result-box">
            <div id="dice-icon">🎲</div>
            <div id="dice-number">20</div>
            <div id="dice-label">Natural 20!</div>
            <div id="dice-roller">by Player</div>
          </div>
        </div>

        <!-- Narration bar -->
        <div id="narration-bar" class="hidden">
          <span id="narration-icon">📜</span>
          <span id="narration-text"></span>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div id="right-panel">

        <!-- CHAT -->
        <div id="chat-section">
          <div class="panel-title">💬 Chat</div>
          <div id="chat-log"></div>
          <div id="chat-input-wrap">
            <input type="text" id="chat-input" placeholder="Say something..." maxlength="200" />
            <button id="btn-chat-send">➤</button>
          </div>
        </div>

        <!-- PLAYER CONTROLS -->
        <div id="controls-section">
          <div class="panel-title">🎮 Actions</div>
          <div id="player-controls">
            <div class="stat-bar-wrap">
              <span class="stat-label">❤️ HP</span>
              <div class="stat-bar-bg">
                <div class="stat-bar-fill" id="my-hp-bar"></div>
              </div>
              <span id="my-hp-text">20/20</span>
            </div>
            <div class="control-btns">
              <button class="btn btn-dice" id="btn-roll-d20">🎲 Roll D20</button>
              <button class="btn btn-heal" id="btn-heal-self">💚 Heal Self</button>
            </div>
            <div id="nearby-enemy-wrap" class="hidden">
              <div class="nearby-label">Nearby Enemy:</div>
              <div id="nearby-enemy-name">Goblin</div>
              <button class="btn btn-attack" id="btn-attack">⚔️ Attack!</button>
            </div>
          </div>

          <!-- DM PANEL (only shown to DM) -->
          <div id="dm-panel" class="hidden">
            <div class="panel-title dm-title">👑 DM Controls</div>

            <div class="dm-section">
              <label>📜 Narration</label>
              <textarea id="dm-narration-input" rows="3" placeholder="Tell your story..."></textarea>
              <button class="btn btn-dm" id="btn-send-narration">Send to All</button>
            </div>

            <div class="dm-section">
              <label>👾 Spawn Enemy</label>
              <div class="spawn-btns">
                <button class="btn btn-enemy goblin" data-type="goblin">🟢 Goblin</button>
                <button class="btn btn-enemy skeleton" data-type="skeleton">💀 Skeleton</button>
                <button class="btn btn-enemy troll" data-type="troll">🟩 Troll</button>
                <button class="btn btn-enemy dragon" data-type="dragon">🔴 Dragon</button>
              </div>
            </div>

            <div class="dm-section">
              <label>⚡ Attack Player</label>
              <div id="dm-player-targets">
                <!-- Injected dynamically -->
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Socket.IO client -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Main client script -->
  <script src="client.js"></script>
</body>
</html>
